name: Auto Deploy

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # JOB 1: Build Backend (Laravel)
  # ============================================================
  build-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Build Backend
        working-directory: ./pusatvillaid
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > .env
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci || true
          npm run build || true
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache
          rm -rf node_modules
          rm -rf resources/js
          rm -rf resources/css
          rm -f package.json package-lock.json vite.config.ts
          rm -f .env
          tar -czf ../backend-deploy.tar.gz .

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend-deploy.tar.gz
          retention-days: 1

  # ============================================================
  # JOB 2: Deploy Backend
  # ============================================================
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-backend

    steps:
      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Backup .env & Upload Backend
        run: |
          sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "cp ${{ secrets.CPANEL_BACKEND_PATH }}/.env ${{ secrets.CPANEL_BACKEND_PATH }}/.env.backup 2>/dev/null || true"
          sshpass -p '${{ secrets.SSH_PASSWORD }}' scp -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT }} backend-deploy.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.CPANEL_BACKEND_PATH }}/
          sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.CPANEL_BACKEND_PATH }} && tar -xzf backend-deploy.tar.gz && rm -f backend-deploy.tar.gz && echo 'Backend files extracted'"

      - name: Post-Deploy Backend
        run: |
          sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.CPANEL_BACKEND_PATH }} && cp .env.backup .env 2>/dev/null || true && rm -f .env.backup && if ! grep -q 'APP_KEY=base64:' .env 2>/dev/null; then php artisan key:generate --force; fi && chmod -R 775 storage bootstrap/cache && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan event:cache && php artisan storage:link --force && php artisan queue:restart || true && echo 'Backend deploy COMPLETE' && ls -la"

  # ============================================================
  # JOB 3: Build Frontend (Next.js)
  # ============================================================
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: https://api.pusatvillaid.com
          NEXT_PUBLIC_API_URL: https://api.pusatvillaid.com/api/v1
        run: |
          npm ci
          npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./frontend/out
          retention-days: 1

  # ============================================================
  # JOB 4: Deploy Frontend
  # ============================================================
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-backend, build-frontend]

    steps:
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: out

      - name: Install sshpass & rsync
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

      - name: Deploy Frontend to cPanel
        run: |
          sshpass -p '${{ secrets.SSH_PASSWORD }}' rsync -avz --delete \
            --exclude='api.pusatvillaid.com' \
            --exclude='.htaccess' \
            out/ \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }}" \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.CPANEL_FRONTEND_PATH }}
          echo "Frontend deployed (symlink preserved)"

      - name: Verify Deployment
        run: |
          sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "echo '=== public_html ===' && ls -la ${{ secrets.CPANEL_FRONTEND_PATH }} && echo '=== villas ===' && ls ${{ secrets.CPANEL_FRONTEND_PATH }}villas/ 2>&1 | head -10 && echo '=== symlink ===' && ls -la ${{ secrets.CPANEL_FRONTEND_PATH }}api.pusatvillaid.com"

  # ============================================================
  # JOB 5: Final Health Check
  # ============================================================
  final-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Health Check
        run: |
          echo "Checking API..."
          curl -s -o /dev/null -w "API Status: %{http_code}\n" https://api.pusatvillaid.com/
          echo "Checking Frontend..."
          curl -s -o /dev/null -w "Frontend Status: %{http_code}\n" https://pusatvillaid.com/
          echo "DEPLOY COMPLETE"
