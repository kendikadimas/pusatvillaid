name: Auto Deploy

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # BACKEND — Laravel
      # ============================================================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Backend
        working-directory: ./pusatvillaid
        run: |
          cp .env.production .env
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache
          rm -rf node_modules
          rm -rf resources/js
          rm -rf resources/css
          rm package.json package-lock.json vite.config.ts

      - name: Deploy Backend to cPanel (api.pusatvillaid.com)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./pusatvillaid/
          server-dir: ${{ secrets.CPANEL_BACKEND_PATH }}

      # ============================================================
      # FRONTEND — Next.js
      # ============================================================
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Deploy Frontend to cPanel (www.pusatvillaid.com)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/out/
          server-dir: ${{ secrets.CPANEL_FRONTEND_PATH }}

      # ============================================================
      # POST-DEPLOY — Run migrations (via SSH)
      # ============================================================
      - name: Run Post-Deploy Commands
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            cd ${{ secrets.CPANEL_BACKEND_PATH }}
            php artisan migrate --force
            php artisan storage:link
            php artisan queue:restart || true
