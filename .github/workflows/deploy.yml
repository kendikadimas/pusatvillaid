name: Auto Deploy

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # JOB 1: Build Backend (Laravel)
  # ============================================================
  build-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Build Backend
        working-directory: ./pusatvillaid
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > .env
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci || true
          npm run build || true
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache
          rm -rf node_modules
          rm -rf resources/js
          rm -rf resources/css
          rm -f package.json package-lock.json vite.config.ts
          rm -f .env
          tar -czf ../backend-deploy.tar.gz --exclude='./.env' .

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend-deploy.tar.gz
          retention-days: 1

  # ============================================================
  # JOB 2: Deploy Backend (via appleboy actions)
  # ============================================================
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-backend

    steps:
      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build

      - name: Backup .env on Server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Backup .env SEBELUM extract (bukan sesudah)
            if [ -f ${{ secrets.CPANEL_BACKEND_PATH }}/.env ]; then
              cp ${{ secrets.CPANEL_BACKEND_PATH }}/.env ${{ secrets.CPANEL_BACKEND_PATH }}/.env.deploy-backup
              echo "=== .env backed up ==="
            else
              echo "=== No .env on server, will generate ==="
            fi

      - name: Upload Backend to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "backend-deploy.tar.gz"
          target: ${{ secrets.CPANEL_BACKEND_PATH }}

      - name: Post-Deploy Backend
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.CPANEL_BACKEND_PATH }}

            # Extract tar.gz (kecuali .env)
            tar -xzf backend-deploy.tar.gz
            rm -f backend-deploy.tar.gz

            # Restore .env dari backup
            if [ -f .env.deploy-backup ]; then
              cp .env.deploy-backup .env
              rm .env.deploy-backup
              echo "=== .env restored ==="
            fi

            # Kalau .env masih nggak ada, generate dari BACKEND_ENV secret
            if [ ! -f .env ] || [ ! -s .env ]; then
              echo "=== .env missing, generating from secret ==="
              echo '${{ secrets.BACKEND_ENV }}' > .env
            fi

            # Generate APP_KEY jika belum ada
            if ! grep -q "APP_KEY=base64:" .env 2>/dev/null; then
              php artisan key:generate --force
              echo "=== APP_KEY generated ==="
            fi

            # Set permissions
            chmod -R 775 storage bootstrap/cache

            # Clear & cache Laravel
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Run migrations
            php artisan migrate --force

            # Storage link
            php artisan storage:link --force

            # Queue restart
            php artisan queue:restart 2>/dev/null || true

            echo "=== Backend deploy COMPLETE ==="
            ls -la

  # ============================================================
  # JOB 3: Build Frontend (Next.js)
  # ============================================================
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: https://api.pusatvillaid.com
          NEXT_PUBLIC_API_URL: https://api.pusatvillaid.com/api/v1
        run: |
          npm ci
          npm run build
          echo "=== Total HTML files ==="
          find out -name "*.html" | wc -l

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./frontend/out
          retention-days: 1

  # ============================================================
  # JOB 4: Deploy Frontend (via SSH + tar, clean old files)
  # ============================================================
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-backend, build-frontend]

    steps:
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-out

      - name: Upload & Deploy Frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "frontend-out"
          target: ${{ secrets.CPANEL_FRONTEND_PATH }}
          strip_components: 1

      - name: Clean Old Frontend Files & Fix Symlink
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            FRONTEND="${{ secrets.CPANEL_FRONTEND_PATH }}"
            BACKEND="/home/${{ secrets.SSH_USERNAME }}/backend-laravel/public"

            # Pastikan symlink API selalu ada (hapus & recreate biar nggak corrupt)
            rm -rf "${FRONTEND}api.pusatvillaid.com"
            ln -s "${BACKEND}" "${FRONTEND}api.pusatvillaid.com"
            echo "=== API symlink re-created ==="

            echo "=== public_html contents ==="
            ls -la "${FRONTEND}"
            echo "=== villas ==="
            ls "${FRONTEND}villas/" 2>&1 | head -10
            echo "=== symlink ==="
            ls -la "${FRONTEND}api.pusatvillaid.com"

  # ============================================================
  # JOB 5: Final Health Check
  # ============================================================
  final-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Health Check
        run: |
          echo "Checking API..."
          curl -s -o /dev/null -w "API Status: %{http_code}\n" https://api.pusatvillaid.com/ || true
          echo "Checking Frontend..."
          curl -s -o /dev/null -w "Frontend Status: %{http_code}\n" https://pusatvillaid.com/ || true
          echo "DEPLOY COMPLETE"
