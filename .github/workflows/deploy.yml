name: Auto Deploy

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # BACKEND — Laravel
      # ============================================================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Backend
        working-directory: ./pusatvillaid
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > .env
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache
          rm -rf node_modules
          rm -rf resources/js
          rm -rf resources/css
          rm package.json package-lock.json vite.config.ts

      - name: Deploy Backend to cPanel (api.pusatvillaid.com)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: '2223'
          source: "./pusatvillaid/"
          target: ${{ secrets.CPANEL_BACKEND_PATH }}

      # ============================================================
      # FRONTEND — Next.js
      # ============================================================
      - name: Build Frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: https://api.pusatvillaid.com
          NEXT_PUBLIC_API_URL: https://api.pusatvillaid.com/api/v1
        run: |
          npm ci
          npm run build
          echo "=== Listing generated files ==="
          find out -type d | head -40
          echo "=== Total HTML files ==="
          find out -name "*.html" | wc -l
          echo "=== Villa detail pages ==="
          ls -la out/villas/ 2>&1 || echo "No villas dir"
          echo "=== Creating tar ==="
          tar -czf frontend.tar.gz -C out .

      - name: Deploy Frontend to cPanel (www.pusatvillaid.com)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: '2223'
          source: "frontend.tar.gz"
          target: "/tmp/"

      - name: Extract Frontend on Server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: '2223'
          script: |
            rm -rf ${{ secrets.CPANEL_FRONTEND_PATH }}*
            tar -xzf /tmp/frontend.tar.gz -C ${{ secrets.CPANEL_FRONTEND_PATH }} || true
            # also try current dir
            ls -la /tmp/frontend.tar.gz 2>&1
            rm /tmp/frontend.tar.gz
            echo "=== Deployed files ==="
            ls -la ${{ secrets.CPANEL_FRONTEND_PATH }}
            echo "=== Villa pages ==="
            ls ${{ secrets.CPANEL_FRONTEND_PATH }}villas/ 2>&1 || echo "No villas dir"

      # ============================================================
      # POST-DEPLOY — Run migrations (via SSH)
      # ============================================================
      - name: Run Post-Deploy Commands
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: '2223'
          script: |
            cd ${{ secrets.CPANEL_BACKEND_PATH }}
            php artisan migrate --force
            php artisan storage:link
            php artisan queue:restart || true
