name: Auto Deploy

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # JOB 1: Build Backend (Laravel)
  # ============================================================
  build-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Build Backend
        working-directory: ./pusatvillaid
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > .env
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci || true
          npm run build || true
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache
          rm -rf node_modules
          rm -rf resources/js
          rm -rf resources/css
          rm -f package.json package-lock.json vite.config.ts
          rm -f .env
          tar -czf ../backend-deploy.tar.gz --exclude='./.env' .

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend-deploy.tar.gz
          retention-days: 1

  # ============================================================
  # JOB 2: Deploy Backend (via native OpenSSH)
  # ============================================================
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-backend

    steps:
      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build

      - name: Setup SSH Key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Backup .env on Server
        shell: bash
        run: |
          ssh -o ConnectTimeout=60 -o ServerAliveInterval=15 \
            -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "if [ -f ${{ secrets.CPANEL_BACKEND_PATH }}/.env ]; then \
               cp ${{ secrets.CPANEL_BACKEND_PATH }}/.env ${{ secrets.CPANEL_BACKEND_PATH }}/.env.deploy-backup; \
               echo '=== .env backed up ==='; \
             else \
               echo '=== No .env on server ==='; \
             fi"

      - name: Upload Backend to Server
        shell: bash
        run: |
          for i in 1 2 3; do
            scp -o ConnectTimeout=60 -o ServerAliveInterval=15 \
                -P ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key \
                backend-deploy.tar.gz \
                ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.CPANEL_BACKEND_PATH }}/backend-deploy.tar.gz && break
            echo "SCP attempt $i failed, retrying in 5s..." && sleep 5
          done

      - name: Upload .env Fallback
        shell: bash
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > .env.fallback
          scp -o ConnectTimeout=60 -P ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key \
            .env.fallback \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.CPANEL_BACKEND_PATH }}/.env.fallback
          rm -f .env.fallback

      - name: Post-Deploy Backend
        shell: bash
        run: |
          ssh -o ConnectTimeout=60 -o ServerAliveInterval=15 \
            -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.CPANEL_BACKEND_PATH }} && \
             tar -xzf backend-deploy.tar.gz && rm -f backend-deploy.tar.gz && \
             if [ -f .env.deploy-backup ]; then \
               cp .env.deploy-backup .env && rm .env.deploy-backup; \
               echo '.env restored'; \
             fi && \
             if [ ! -f .env ] || [ ! -s .env ]; then \
               mv .env.fallback .env 2>/dev/null; \
               echo '.env from secret fallback'; \
             else \
               rm -f .env.fallback; \
             fi && \
             if ! grep -q 'APP_KEY=base64:' .env 2>/dev/null; then \
               php artisan key:generate --force; \
             fi && \
             chmod -R 775 storage bootstrap/cache && \
             php artisan cache:clear && \
             php artisan config:cache && \
             php artisan route:cache && \
             php artisan view:cache && \
             php artisan event:cache && \
             php artisan migrate --force && \
             php artisan storage:link --force && \
             php artisan queue:restart 2>/dev/null; \
             echo '=== Backend deploy COMPLETE ==='"

      - name: Cleanup SSH Key
        if: always()
        shell: bash
        run: rm -f ~/.ssh/deploy_key

  # ============================================================
  # JOB 3: Build Frontend (Next.js)
  # ============================================================
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: https://api.pusatvillaid.com
          NEXT_PUBLIC_API_URL: https://api.pusatvillaid.com/api/v1
        run: |
          npm ci
          npm run build
          echo "=== Total HTML files ==="
          find out -name "*.html" | wc -l

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./frontend/out
          retention-days: 1

  # ============================================================
  # JOB 4: Deploy Frontend (via native OpenSSH)
  # ============================================================
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-backend, build-frontend]

    steps:
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-out

      - name: Setup SSH Key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Clear Old Frontend Files on Server
        shell: bash
        run: |
          ssh -o ConnectTimeout=60 -o ServerAliveInterval=15 \
            -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "FRONTEND=${{ secrets.CPANEL_FRONTEND_PATH }} && \
             BACKEND=/home/${{ secrets.SSH_USERNAME }}/backend-laravel/public && \
             echo '=== Clearing old frontend files ===' && \
             find \"\${FRONTEND}\" -mindepth 1 -maxdepth 1 \
               ! -name 'api.pusatvillaid.com' \
               ! -name '.htaccess' \
               ! -name '.user.ini' \
               -exec rm -rf {} + 2>/dev/null || true && \
             echo '=== Ensuring API symlink is intact ===' && \
             if [ ! -L \"\${FRONTEND}api.pusatvillaid.com\" ]; then \
               rm -rf \"\${FRONTEND}api.pusatvillaid.com\" && \
               ln -s \"\${BACKEND}\" \"\${FRONTEND}api.pusatvillaid.com\" && \
               echo '=== API symlink re-created after clear ==='; \
             else \
               echo '=== API symlink already intact ==='; \
             fi && \
             echo '=== Old files cleared ==='"

      - name: Upload & Deploy Frontend
        shell: bash
        run: |
          tar czf frontend-out.tar.gz -C frontend-out .
          for i in 1 2 3; do
            scp -o ConnectTimeout=60 -o ServerAliveInterval=15 \
                -P ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key \
                frontend-out.tar.gz \
                ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.CPANEL_FRONTEND_PATH }}/frontend-out.tar.gz && break
            echo "SCP attempt $i failed, retrying in 5s..." && sleep 5
          done
          ssh -o ConnectTimeout=60 -o ServerAliveInterval=15 \
            -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.CPANEL_FRONTEND_PATH }} && tar xzf frontend-out.tar.gz && rm -f frontend-out.tar.gz"
          rm -f frontend-out.tar.gz

      - name: Verify Symlink & Deploy
        shell: bash
        run: |
          ssh -o ConnectTimeout=60 -o ServerAliveInterval=15 \
            -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "FRONTEND=${{ secrets.CPANEL_FRONTEND_PATH }} && \
             BACKEND=/home/${{ secrets.SSH_USERNAME }}/backend-laravel/public && \
             if [ ! -L \"\${FRONTEND}api.pusatvillaid.com\" ]; then \
               rm -rf \"\${FRONTEND}api.pusatvillaid.com\" && \
               ln -s \"\${BACKEND}\" \"\${FRONTEND}api.pusatvillaid.com\" && \
               echo '=== API symlink created ==='; \
             else \
               echo '=== API symlink already intact ==='; \
             fi && \
             ls -la \"\${FRONTEND}\" && \
             ls -la \"\${FRONTEND}api.pusatvillaid.com\""

      - name: Cleanup SSH Key
        if: always()
        shell: bash
        run: rm -f ~/.ssh/deploy_key

  # ============================================================
  # JOB 5: Final Health Check
  # ============================================================
  final-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Health Check
        run: |
          echo "Checking API..."
          curl -s -o /dev/null -w "API Status: %{http_code}\n" https://api.pusatvillaid.com/ || true
          echo "Checking Frontend..."
          curl -s -o /dev/null -w "Frontend Status: %{http_code}\n" https://pusatvillaid.com/ || true
          echo "DEPLOY COMPLETE"
